name: Deploy demo landscape

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout demo repository
        uses: actions/checkout@v5

      - name: Checkout landscape2 with fix
        uses: actions/checkout@v5
        with:
          repository: cncf/landscape2
          ref: cynthia-sg/fix-quiz-url
          path: landscape2-src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.93.1

      - name: Install wasm-pack
        run: curl -fsSL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Install landscape2 from source
        run: cargo install --path ./landscape2-src/crates/cli --force

      - name: Build landscape
        run: |
          landscape2 build \
            --data-file ./data.yml \
            --settings-file ./settings.yml \
            --guide-file ./guide.yml \
            --games-file ./games.yml \
            --logos-path ./logos \
            --output-dir ./build

      - name: Configure SPA fallback
        run: cp ./build/index.html ./build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
