name: Deploy demo landscape

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install landscape2
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/cncf/landscape2/releases/download/v1.1.0/landscape2-installer.sh | sh
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Build landscape
        run: |
          landscape2 build \
            --data-file ./data.yml \
            --settings-file ./settings.yml \
            --guide-file ./guide.yml \
            --games-file ./games.yml \
            --logos-path ./logos \
            --output-dir ./build

      - name: Configure SPA fallback
        run: cp ./build/index.html ./build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
